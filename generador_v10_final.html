
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f0f5ee;}
#app{max-width:700px;margin:0 auto;padding:1.5rem 1rem;}

.hdr{text-align:center;margin-bottom:1.5rem;background:#2d5a27;border-radius:12px;padding:1.25rem 1rem;}
.hdr h1{font-size:22px;font-weight:700;color:#f5e9c0;letter-spacing:.02em;margin-bottom:4px;}
.hdr p{font-size:12px;color:#a8c8a0;font-style:italic;}

.tabs{display:flex;border-bottom:2px solid #4a7c3f;margin-bottom:1.25rem;overflow-x:auto;background:#e8f0e5;border-radius:8px 8px 0 0;}
.tab{padding:9px 13px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#4a6645;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500;}
.tab.on{color:#2d5a27;border-bottom:3px solid #2d5a27;font-weight:700;background:#d4e8ce;}
.tab:hover:not(.on){background:#deecd8;color:#2d5a27;}

.pnl{display:none;}.pnl.on{display:block;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
label{font-size:12px;color:#3d5c38;font-weight:600;display:block;margin-bottom:4px;}
select{width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #7aab6a;border-radius:8px;background:#f5faf3;color:#2d4a28;}
select:focus{outline:none;border-color:#2d5a27;}

.btn{width:100%;padding:12px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#c9a227,#e8c040);color:#3d2800;border:none;border-radius:8px;cursor:pointer;margin-top:8px;letter-spacing:.03em;box-shadow:0 2px 6px rgba(180,140,0,.25);}
.btn:hover{background:linear-gradient(135deg,#d4ad2c,#f0cc48);box-shadow:0 3px 10px rgba(180,140,0,.4);}
.btn:active{transform:scale(0.98);}

.card{display:none;margin-top:1.25rem;border:1.5px solid #7aab6a;border-radius:12px;overflow:hidden;background:#fff;}
.card.on{display:block;}

/* imagen enemigo/jefe: 500x800 */
.card-img-wrap{width:500px;height:800px;overflow:hidden;background:#d4e8ce;margin:0 auto;display:block;}
.card-img{width:500px;height:800px;object-fit:cover;object-position:center center;display:block;}
.card-img.loading{opacity:.6;}

.card-body{padding:1.25rem;}
.card h2{font-size:17px;font-weight:700;margin-bottom:4px;color:#1e3d1a;}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700;display:inline-block;margin-left:4px;}
.bd{background:#fde;color:#900;}.bw{background:#ffd;color:#760;}.bi{background:#def;color:#059;}.bs{background:#dfd;color:#155a10;}.bm{background:#fff3cd;color:#856404;}
.sec{font-size:11px;font-weight:700;color:#4a7c3f;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 5px;}
.ct{font-size:14px;line-height:1.7;color:#222;}.cm{font-size:14px;line-height:1.7;color:#555;font-style:italic;}
.stats2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.sb{background:#e8f0e5;border-radius:8px;padding:10px;text-align:center;border:1px solid #b0d0a8;}
.sl{font-size:11px;color:#4a6645;display:block;margin-bottom:2px;}
.sv{font-size:22px;font-weight:700;color:#1e3d1a;}
.div{border:none;border-top:1px solid #c8ddc4;margin:12px 0;}
.hi{background:#e8f0e5;border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid #b0d0a8;}
.hi:hover{background:#d4e8ce;}
.hn{font-weight:700;font-size:14px;color:#1e3d1a;}.ht{font-size:11px;color:#5a7a55;}
.atkt{width:100%;border-collapse:collapse;margin-top:6px;font-size:14px;}
.atkt th{background:#d4e8ce;padding:6px 10px;text-align:left;font-weight:700;font-size:12px;border:1px solid #b0d0a8;color:#2d5a27;}
.atkt td{padding:7px 10px;border:1px solid #ddeedd;vertical-align:top;}
.atkt tr.fl td{color:#bbb;font-style:italic;}
.atkt tr.md td{background:#fffbf0;}
.atkt tr.hx td{background:#fff0f0;}
.atkt tr.jh td{background:#f5f0ff;}
.rpill{font-weight:700;font-size:13px;white-space:nowrap;}
.dico{display:inline-block;background:#2d5a27;color:#f5e9c0;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:6px;}
.hab{background:#fff3f0;border:1.5px solid #f5c0c0;border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.65;margin-top:4px;}
.hab-label{font-size:11px;font-weight:700;color:#b00;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}

/* Turno de acción */
.turno-card{display:none;margin-top:1.25rem;border:2px solid #c9a227;border-radius:12px;overflow:hidden;background:#fff;}
.turno-card.on{display:block;}
.turno-header{background:linear-gradient(135deg,#2d5a27,#3d7a32);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.turno-header h3{font-size:15px;font-weight:700;color:#f5e9c0;margin:0;}
.turno-tipo-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:#c9a227;color:#3d2800;}

/* evento */
.ev-card{border-radius:12px;overflow:hidden;margin-top:1.25rem;display:none;border:1.5px solid #7aab6a;}
.ev-card.on{display:block;}
.ev-img-wrap{width:1000px;height:700px;overflow:hidden;background:#d4e8ce;margin:0 auto;display:block;position:relative;}
.ev-img{width:1000px;height:700px;object-fit:cover;object-position:center center;display:block;}
.ev-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.6));pointer-events:none;}
.ev-body{padding:1.25rem;background:#fff;}
.ev-terreno{font-size:12px;color:#5a7a55;margin-bottom:14px;}
.ev-narr{font-size:14px;line-height:1.8;color:#333;margin-bottom:14px;padding:12px 14px;background:#f0f7ee;border-left:3px solid #4a7c3f;border-radius:0 6px 6px 0;}
.mec-block{border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.mec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.mec-text{font-size:14px;line-height:1.65;}
.mec-result{font-size:13px;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(0,0,0,.12);}
.mec-peligro{background:#fff3f3;border:1px solid #f5c0c0;}.mec-peligro .mec-label{color:#b00;}
.mec-ventaja{background:#f3fff5;border:1px solid #b8e8bf;}.mec-ventaja .mec-label{color:#155a10;}
.mec-moneda-pos{background:#fffbea;border:1px solid #f0d060;}.mec-moneda-pos .mec-label{color:#7a5c00;}
.mec-moneda-neg{background:#fff3f3;border:1px solid #f5c0c0;}.mec-moneda-neg .mec-label{color:#900;}
.mec-decision{background:#f8f0ff;border:1px solid #d0b0f0;}.mec-decision .mec-label{color:#60c;}
.mec-dado{background:#f0f5ea;border:1px solid #b0d0a8;}.mec-dado .mec-label{color:#2d5a27;}
.coin{display:inline-block;background:#c8a820;color:#fff;font-weight:700;font-size:12px;padding:2px 9px;border-radius:99px;margin-left:4px;}
.d20pill{display:inline-block;background:#2d5a27;color:#f5e9c0;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin:0 3px;}
</style>

<div id="app">
<div class="hdr">
  <h1>⚔️ D&D: Comienza la Aventura</h1>
  <p>Un generador de contenido diseñado por Pablo Lopez</p>
</div>

<div class="tabs">
  <button class="tab on" id="t-tur" onclick="ST('tur')">Turno de Acción</button>
  <button class="tab" id="t-ene" onclick="ST('ene')">Enemigos</button>
  <button class="tab" id="t-jef" onclick="ST('jef')">Jefes</button>
  <button class="tab" id="t-eve" onclick="ST('eve')">Eventos</button>
  <button class="tab" id="t-his" onclick="ST('his')">Historial</button>
</div>

<!-- TURNO DE ACCIÓN -->
<div class="pnl on" id="p-tur">
  <div><label>Terreno</label>
    <select id="tur-ter">
      <option>Pueblo de Neverwinter</option>
      <option>Bosque de Neverwinter</option>
      <option>Gauntlgrym</option>
      <option>Monte Hotenow</option>
    </select>
  </div>
  <button class="btn" id="bTur">⚡ Nuevo Turno de Acción</button>
  <div class="turno-card" id="c-tur"></div>
</div>

<!-- ENEMIGOS -->
<div class="pnl" id="p-ene">
  <div class="row">
    <div><label>Terreno</label><select id="e-ter"><option>Cualquiera</option><option>Pueblo de Neverwinter</option><option>Bosque de Neverwinter</option><option>Gauntlgrym</option><option>Monte Hotenow</option></select></div>
    <div><label>Dificultad</label><select id="e-dif"><option>Cualquiera</option><option>Fácil</option><option>Medio</option><option>Difícil</option></select></div>
  </div>
  <button class="btn" id="bEne">🎲 Generar enemigo</button>
  <div class="card" id="c-ene"></div>
</div>

<!-- JEFES -->
<div class="pnl" id="p-jef">
  <div><label>Terreno</label><select id="j-ter"><option>Cualquiera</option><option>Pueblo de Neverwinter</option><option>Bosque de Neverwinter</option><option>Gauntlgrym</option><option>Monte Hotenow</option></select></div>
  <button class="btn" id="bJef">🎲 Generar jefe final</button>
  <div class="card" id="c-jef"></div>
</div>

<!-- EVENTOS -->
<div class="pnl" id="p-eve">
  <div class="row">
    <div><label>Terreno</label><select id="v-ter"><option>Pueblo de Neverwinter</option><option>Bosque de Neverwinter</option><option>Gauntlgrym</option><option>Monte Hotenow</option></select></div>
    <div><label>Tipo de evento</label><select id="v-tip"><option>Aleatorio</option><option>Peligro</option><option>Ventaja</option><option>Narrativo</option><option>Monedas</option></select></div>
  </div>
  <button class="btn" id="bEve">🎲 Revelar evento</button>
  <div class="ev-card" id="c-eve"></div>
</div>

<!-- HISTORIAL -->
<div class="pnl" id="p-his">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:14px;color:#4a6645;font-weight:600;">Generado en esta sesión</span>
    <button id="bClear" style="font-size:12px;background:#e8f0e5;border:1px solid #7aab6a;border-radius:6px;padding:4px 10px;cursor:pointer;color:#2d5a27;font-weight:600;">Limpiar</button>
  </div>
  <div id="hl"><p style="font-size:14px;color:#5a7a55;padding:1rem 0;">Aún no has generado contenido.</p></div>
</div>
</div>

acar este turno. Debe tirar el <span class='d20pill'>d20</span>: si saca menos de 10, el enemigo le ataca normalmente.",dur:"1 turno"},{n:"Temblor de Tierra",narr:"Una vibración sorda sacude el suelo. La inestabilidad consume toda la atención.",tipo:"peligro",mecanica:"Un héroe a elección no puede atacar este turno. Debe tirar el <span class='d20pill'>d20</span>: si saca menos de 10, el enemigo le ataca normalmente.",dur:"1 turno"},{n:"Gases Sulfurosos",narr:"Una grieta libera gases que hacen arder la garganta y entumecen los músculos.",tipo:"peligro",mecanica:"-2 al próximo dado de ataque del héroe más cercano (a elección del grupo).",dur:"1 ataque"}],Ventaja:[{n:"La Salamandra Herida",narr:"Una salamandra elemental yace atrapada bajo una roca caída. Os mira sin agresividad.",tipo:"ventaja",decision:{pregunta:"¿Liberáis a la salamandra?",si:{texto:"La salamandra deposita a vuestros pies un cristal de magma con energía.",objeto:true},no:{texto:"Seguís adelante. La salamandra os sigue con la mirada."}},dur:"Inmediato"},{n:"El Minero Superviviente",narr:"Un minero cubierto de hollín os sale al paso. 'Tengo algo que encontré en las minas, pero necesito ayuda para llegar al refugio.'",tipo:"ventaja",decision:{pregunta:"¿Escoláis al minero hasta el refugio?",si:{texto:"El minero llega sano y os entrega lo que encontró.",objeto:true},no:{texto:"El minero asiente con resignación y continúa solo."}},dur:"Inmediato"},{n:"Agua de Deshielo",narr:"En un recodo protegido del calor, un hilo de agua helada corre por la piedra.",tipo:"ventaja",efecto:"Todos los héroes recuperan 1 punto de vida.",dur:"Inmediato"}],Narrativo:[{n:"La Tablilla de Obsidiana",narr:"Encontráis una tablilla de obsidiana con inscripciones. Hay un mensaje superficial y otro oculto.",tipo:"narrativo",dado:{instruccion:"Tirada de Percepción — tira el <span class='d20pill'>d20</span>.",exito:{umbral:12,texto:"Encontráis el mensaje oculto. El jefe comienza con 3 puntos de vida menos."},fallo:{texto:"Solo leéis el texto superficial."}},dur:"Resto de partida"},{n:"El Patrón de la Lava",narr:"Los ríos de lava forman un patrón que se repite. Es el mapa de movimiento del guardián.",tipo:"narrativo",dado:{instruccion:"Tirada de Inteligencia — tira el <span class='d20pill'>d20</span>.",exito:{umbral:12,texto:"Comprendéis el patrón. El jefe comienza con 3 puntos de vida menos."},fallo:{texto:"El patrón cambia demasiado rápido."}},dur:"Resto de partida"}],Monedas:[{n:"Fundición Abandonada",narr:"En una antigua fundición encontráis una moneda de oro que nunca circuló.",tipo:"moneda-pos",efecto:"El grupo gana <span class='coin'>+1 moneda</span>.",dur:"Inmediato"},{n:"El Guía Oportunista",narr:"Un supuesto conocedor del terreno os cobra por guiaros. No era tan especial.",tipo:"moneda-neg",efecto:"El grupo pierde <span class='coin'>-1 moneda</span>.",dur:"Inmediato"},{n:"Veta de Oro",narr:"Una pequeña veta de oro asoma entre las rocas volcánicas.",tipo:"moneda-pos",efecto:"El grupo gana <span class='coin'>+1 moneda</span>.",dur:"Inmediato"},{n:"Equipo Dañado por el Calor",narr:"El calor extremo deteriora parte del equipo. Un herrero ambulante cobra por la reparación.",tipo:"moneda-neg",efecto:"El grupo pierde <span class='coin'>-1 moneda</span>.",dur:"Inmediato"}]}};

function R(a){return a[Math.floor(Math.random()*a.length)];}
function RN(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function GV(id){return document.getElementById(id).value;}
function ST(t){['tur','ene','jef','eve','his'].forEach(function(x){document.getElementById('t-'+x).classList.remove('on');document.getElementById('p-'+x).classList.remove('on');});document.getElementById('t-'+t).classList.add('on');document.getElementById('p-'+t).classList.add('on');}

function RA(atks,esJefe){
  var h='<table class="atkt"><thead><tr><th><span class="dico">d10</span>Resultado</th><th>Ataque / Efecto</th></tr></thead><tbody>';
  atks.forEach(function(a){var fl=a.e==='Falla';var r=a.r;var cls=fl?'fl':(esJefe&&(r.startsWith('7')||r.startsWith('8'))?'jh':(r.startsWith('7')||r.startsWith('8'))?'hx':'md');h+='<tr class="'+cls+'"><td><span class="rpill">'+r+'</span></td><td>'+a.e+'</td></tr>';});
  return h+'</tbody></table>';
}

function cardImg(file,alt){
  return '<div class="card-img-wrap"><img class="card-img loading" src="'+BASE+file+'" alt="'+alt+'" onload="this.classList.remove(\'loading\')" onerror="this.parentElement.innerHTML=\'<div style=&quot;width:500px;height:200px;background:#e8f0e5;display:flex;align-items:center;justify-content:center;font-size:13px;color:#5a7a55;&quot;>Sin imagen</div>\'"></div>';
}

function evImg(file,alt){
  return '<div class="ev-img-wrap"><img class="ev-img" src="'+BASE+file+'" alt="'+alt+'" onerror="this.parentElement.style.display=\'none\'"><div class="ev-img-overlay"></div></div>';
}

function buildEvHTML(ev, tipoFinal, ter, cf){
  var obj=R(OBJETOS);
  var imgKey=ev.tipo==='peligro'?'peligro':ev.tipo==='ventaja'?'ventaja':ev.tipo==='narrativo'?'narrativo':ev.tipo==='moneda-pos'?'moneda-pos':'moneda-neg';
  var body='<div class="ev-body"><h2 style="font-size:16px;font-weight:700;margin-bottom:4px;color:#1e3d1a;">'+ev.n+' <span class="badge '+cf.badge+'">'+tipoFinal+'</span></h2>'+
    '<p class="ev-terreno">'+ter+'</p>'+
    '<div class="ev-narr" style="border-left-color:'+cf.bar+'">'+ev.narr+'</div>';
  if(ev.tipo==='peligro'){body+='<div class="mec-block mec-peligro"><div class="mec-label">⚠ Efecto en juego</div><div class="mec-text">'+ev.mecanica+'</div><div class="mec-result" style="color:#888">Duración: '+ev.dur+'</div></div>';}
  else if(ev.tipo==='ventaja'&&ev.decision){body+='<div class="mec-block mec-decision"><div class="mec-label">⚖ Decisión del grupo</div><div class="mec-text">'+ev.decision.pregunta+'</div></div><div class="mec-block mec-ventaja"><div class="mec-label">✓ Si ayudáis</div><div class="mec-text">'+ev.decision.si.texto+'</div>'+(ev.decision.si.objeto?'<div class="mec-result"><strong>🃏 Objeto obtenido:</strong> '+obj+'</div>':'')+'</div><div class="mec-block mec-dado"><div class="mec-label" style="color:#555">✗ Si no ayudáis</div><div class="mec-text" style="color:#666">'+ev.decision.no.texto+'</div></div><div style="font-size:12px;color:#aaa;margin-top:6px">Duración: '+ev.dur+'</div>';}
  else if(ev.tipo==='ventaja'&&ev.efecto){body+='<div class="mec-block mec-ventaja"><div class="mec-label">✓ Efecto en juego</div><div class="mec-text">'+ev.efecto+'</div><div class="mec-result" style="color:#888">Duración: '+ev.dur+'</div></div>';}
  else if(ev.tipo==='narrativo'){body+='<div class="mec-block mec-dado"><div class="mec-label">🎲 '+ev.dado.instruccion+'</div><div class="mec-result"><strong style="color:#155a10">✓ '+ev.dado.exito.umbral+'+ en el dado:</strong> '+ev.dado.exito.texto+'</div><div class="mec-result"><strong style="color:#900">✗ Menos de '+ev.dado.exito.umbral+':</strong> '+ev.dado.fallo.texto+'</div></div><div style="font-size:12px;color:#aaa;margin-top:6px">Duración si se logra: '+ev.dur+'</div>';}
  else if(ev.tipo==='moneda-pos'){body+='<div class="mec-block mec-moneda-pos"><div class="mec-label">🪙 Ganancia</div><div class="mec-text">'+ev.efecto+'</div><div class="mec-result" style="color:#888">Duración: '+ev.dur+'</div></div>';}
  else if(ev.tipo==='moneda-neg'){body+='<div class="mec-block mec-moneda-neg"><div class="mec-label">🪙 Pérdida</div><div class="mec-text">'+ev.efecto+'</div><div class="mec-result" style="color:#888">Duración: '+ev.dur+'</div></div>';}
  body+='</div>';
  return evImg(IMG_EVT[imgKey]||'',ev.n)+body;
}

// TURNO DE ACCIÓN — aleatoriamente enemigo o evento
function gTurno(){
  var ter=GV('tur-ter');
  var esEnemigo=Math.random()<0.6; // 60% enemigo, 40% evento
  var c=document.getElementById('c-tur');
  c.className='turno-card on';

  if(esEnemigo){
    var pool=CP.filter(function(e){return e.t===ter;});
    if(!pool.length) pool=CP;
    var e=R(pool);
    var bc=e.d==='Difícil'?'bd':e.d==='Medio'?'bw':'bs';
    var imgFile=IMG_ENE[e.n]||'';
    c.innerHTML=
      '<div class="turno-header"><h3>⚔️ ¡Aparece un enemigo!</h3><span class="turno-tipo-badge">'+e.d+'</span></div>'+
      (imgFile?cardImg(imgFile,e.n):'')+
      '<div class="card-body">'+
      '<h2>'+e.n+' <span class="badge '+bc+'">'+e.d+'</span></h2>'+
      '<p style="font-size:12px;color:#5a7a55;margin-bottom:6px">'+e.t+'</p>'+
      '<p class="cm" style="margin-bottom:12px">"'+e.f+'"</p>'+
      '<div class="stats2"><div class="sb"><span class="sl">Puntos de vida</span><span class="sv">'+e.v+'</span></div>'+
      '<div class="sb"><span class="sl">Dificultad</span><span class="sv" style="font-size:15px;padding-top:3px">'+e.d+'</span></div></div>'+
      '<div class="sec"><span class="dico">d10</span>Tabla de ataques</div>'+RA(e.a,false)+
      '</div>';
    hist.unshift({tp:'Turno · Enemigo',nm:e.n,tb:'tur'});
  } else {
    var pool=EVT[ter];
    if(!pool){pool=EVT['Bosque de Neverwinter'];}
    var tipos=['Peligro','Ventaja','Narrativo','Monedas'];
    var tipoFinal=R(tipos);
    var lista=pool[tipoFinal]||[];
    if(!lista.length){tipoFinal='Peligro';lista=pool['Peligro']||[];}
    var ev=R(lista);
    var cfg={Peligro:{badge:'bd',bar:'#e09090'},Ventaja:{badge:'bs',bar:'#80c890'},Narrativo:{badge:'bi',bar:'#80a8e0'},Monedas:{badge:'bm',bar:'#c8a820'}};
    var cf=cfg[tipoFinal]||cfg['Narrativo'];
    c.innerHTML=
      '<div class="turno-header"><h3>🎴 ¡Evento!</h3><span class="turno-tipo-badge">'+tipoFinal+'</span></div>'+
      buildEvHTML(ev,tipoFinal,ter,cf);
    hist.unshift({tp:'Turno · Evento',nm:ev.n,tb:'tur'});
  }
  RH();
}

function gEne(){
  var ter=GV('e-ter'),dif=GV('e-dif');
  var pool=CP.filter(function(e){return(ter==='Cualquiera'||e.t===ter)&&(dif==='Cualquiera'||e.d===dif);});
  if(!pool.length) pool=CP;
  var e=R(pool);
  var bc=e.d==='Difícil'?'bd':e.d==='Medio'?'bw':'bs';
  var imgFile=IMG_ENE[e.n]||'';
  var c=document.getElementById('c-ene');c.className='card on';
  c.innerHTML=(imgFile?cardImg(imgFile,e.n):'')+
    '<div class="card-body">'+
    '<h2>'+e.n+' <span class="badge '+bc+'">'+e.d+'</span></h2>'+
    '<p style="font-size:12px;color:#5a7a55;margin-bottom:6px">'+e.t+'</p>'+
    '<p class="cm" style="margin-bottom:12px">"'+e.f+'"</p>'+
    '<div class="stats2"><div class="sb"><span class="sl">Puntos de vida</span><span class="sv">'+e.v+'</span></div>'+
    '<div class="sb"><span class="sl">Dificultad</span><span class="sv" style="font-size:15px;padding-top:3px">'+e.d+'</span></div></div>'+
    '<div class="sec"><span class="dico">d10</span>Tabla de ataques</div>'+RA(e.a,false)+
    '</div>';
  hist.unshift({tp:'Enemigo',nm:e.n,tb:'ene'});RH();
}

function gJef(){
  var ter=GV('j-ter');
  var pool=ter==='Cualquiera'?JF:JF.filter(function(j){return j.t===ter;});
  if(!pool.length) pool=JF;
  var j=R(pool);
  var vida=RN(8,10);
  var imgFile=IMG_JEF[j.n]||'';
  var c=document.getElementById('c-jef');c.className='card on';
  c.innerHTML=(imgFile?cardImg(imgFile,j.n):'')+
    '<div class="card-body">'+
    '<h2>'+j.n+' <span class="badge bd">Jefe Final</span></h2>'+
    '<p style="font-size:12px;color:#5a7a55;margin-bottom:6px">'+j.t+'</p>'+
    '<p class="cm" style="margin-bottom:12px">"'+j.f+'"</p>'+
    '<div class="stats2"><div class="sb"><span class="sl">Puntos de vida</span><span class="sv">'+vida+'</span></div>'+
    '<div class="sb"><span class="sl">Categoría</span><span class="sv" style="font-size:15px;padding-top:3px">Jefe</span></div></div>'+
    '<div class="sec"><span class="dico">d10</span>Tabla de ataques</div>'+RA(j.a,true)+
    '<div class="sec">Habilidad especial</div>'+
    '<div class="hab"><div class="hab-label">⚡ Efecto permanente durante el combate</div>'+j.h+'</div>'+
    '</div>';
  hist.unshift({tp:'Jefe Final',nm:j.n+' ('+vida+' pts)',tb:'jef'});RH();
}

function gEve(){
  var ter=GV('v-ter'),tip=GV('v-tip');
  var pool=EVT[ter];if(!pool)return;
  var tipos=['Peligro','Ventaja','Narrativo','Monedas'];
  var tipoFinal=tip==='Aleatorio'?R(tipos):tip;
  var lista=pool[tipoFinal];
  if(!lista||!lista.length){tipoFinal=R(tipos);lista=pool[tipoFinal];}
  var ev=R(lista);
  var cfg={Peligro:{badge:'bd',border:'#f5c0c0',bg:'#fff5f5',bar:'#e09090'},Ventaja:{badge:'bs',border:'#b8e8bf',bg:'#f5fff7',bar:'#80c890'},Narrativo:{badge:'bi',border:'#b8cef0',bg:'#f5f8ff',bar:'#80a8e0'},Monedas:{badge:'bm',border:'#f0d060',bg:'#fffbea',bar:'#c8a820'}};
  var cf=cfg[tipoFinal]||cfg['Narrativo'];
  var c=document.getElementById('c-eve');c.className='ev-card on';
  c.style.border='1.5px solid '+cf.border;c.style.background=cf.bg;
  c.innerHTML=buildEvHTML(ev,tipoFinal,ter,cf);
  hist.unshift({tp:'Evento · '+tipoFinal,nm:ev.n,tb:'eve'});RH();
}

function RH(){
  var el=document.getElementById('hl');
  if(!hist.length){el.innerHTML='<p style="font-size:14px;color:#5a7a55;padding:1rem 0;">Aún no has generado contenido.</p>';return;}
  el.innerHTML=hist.map(function(h){return '<div class="hi" onclick="ST(\''+h.tb+'\')"><div><div class="hn">'+h.nm+'</div><div class="ht">'+h.tp+'</div></div><span style="font-size:18px;color:#4a7c3f">›</span></div>';}).join('');
}

document.getElementById('bTur').addEventListener('click',gTurno);
document.getElementById('bEne').addEventListener('click',gEne);
document.getElementById('bJef').addEventListener('click',gJef);
document.getElementById('bEve').addEventListener('click',gEve);
document.getElementById('bClear').addEventListener('click',function(){hist=[];RH();});
